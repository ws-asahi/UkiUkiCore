name: Report Size Deltas

on:
  # NOTE (UkiUkiCore): the upstream 5-minute cron burns GitHub Actions minutes
  # fast on a PRIVATE repository, so the schedule trigger is disabled while
  # this repo is private. Re-enable the cron when the repo goes public.
  # https://github.com/arduino/report-size-deltas/README.md
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      # See: https://github.com/arduino/report-size-deltas/README.md
      - name: Comment size deltas reports to PRs
        uses: arduino/report-size-deltas@main
        with:
          sketches-reports-source: sketches-reports
