sentence=UkiUkiduinoのオンボード機能(フルカラーLED・ボタン)を体験するサンプル集です。
paragraph=オンボードのWS2812D-F5フルカラーLED(setBLEDColorで色と明るさを変更、D13/LED_BUILTINで点灯・消灯)とオンボードボタン(BTN_BUILTIN、押下=HIGH)を、配線なしでそのまま試せるサンプルを収録しています。APIはコアに組み込まれているため、このライブラリのincludeは必須ではありません。
